<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Table Rush — Three.js Prototype</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#1c130a; font-family:'Arial Black',Arial,sans-serif; }
  #c { position:fixed; inset:0; width:100%; height:100%; display:block; }
  /* warm vignette for depth */
  #vig { position:fixed; inset:0; pointer-events:none; z-index:2;
    box-shadow: inset 0 0 160px 40px rgba(60,30,5,.35); }

  /* ---- HUD (UI-UX-PRO: big, obvious, readable < 1s) ---- */
  #hud { position:fixed; inset:0; z-index:3; pointer-events:none; }
  .pill { position:absolute; display:flex; align-items:center; gap:8px;
    background:rgba(74,42,20,.92); border:2px solid rgba(244,194,90,.6);
    border-radius:18px; padding:8px 16px; color:#fff;
    box-shadow:0 6px 14px rgba(120,60,10,.35), inset 0 2px 0 rgba(255,255,255,.12); }
  #score { top:14px; left:14px; }
  #score .ic { width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFE680, #FFC21E 60%, #C98A0E);
    box-shadow:inset 0 0 0 2px #C98A0E; display:grid;place-items:center;
    color:#9A6500;font-size:14px; }
  #score .v { font-size:22px; color:#FFE27A; }
  #timer { top:14px; right:14px; font-size:22px; }
  #timer .ic { font-size:18px; }
  #fps { top:64px; right:14px; font-size:12px; padding:4px 10px;
    background:rgba(20,12,4,.6); border-color:rgba(255,255,255,.18); color:#CDE8B0; }
  #hint { left:50%; transform:translateX(-50%); bottom:26px; font-size:14px;
    background:rgba(40,22,8,.82); color:#FFE9C6; letter-spacing:.3px; }
  #title { top:60px; left:50%; transform:translateX(-50%); font-size:13px;
    color:#FFD9A0; background:rgba(40,22,8,.55); letter-spacing:2px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div>
<div id="hud">
  <div class="pill" id="title">TABLE RUSH · 3D PROTOTYPE</div>
  <div class="pill" id="score"><div class="ic">$</div><div class="v" id="score-v">0</div></div>
  <div class="pill" id="timer"><span class="ic">⏱</span><span id="timer-v">2:00</span></div>
  <div class="pill" id="fps">FPS <span id="fps-v">–</span></div>
  <div class="pill" id="hint">Tap a table with a bubble to serve · tap 💰 to collect</div>
</div>
<script type="module" src="./game.js"></script>
</body>
</html>
