<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 72">
  <!-- Shadow -->
  <ellipse cx="24" cy="70" rx="11" ry="2.5" fill="#0000001A"/>
  <!-- Heels -->
  <rect x="16" y="64" width="4" height="6" rx="1" fill="#4A0072"/>
  <rect x="28" y="64" width="4" height="6" rx="1" fill="#4A0072"/>
  <rect x="18" y="68" width="1" height="3" rx="0.5" fill="#2E0050"/>
  <rect x="30" y="68" width="1" height="3" rx="0.5" fill="#2E0050"/>
  <!-- Legs -->
  <rect x="16" y="52" width="6" height="14" rx="3" fill="#FDDBB8"/>
  <rect x="26" y="52" width="6" height="14" rx="3" fill="#FDDBB8"/>
  <!-- Dress skirt A-line -->
  <path d="M12 38 Q10 54 16 54 L32 54 Q38 54 36 38 Z" fill="#7B1FA2"/>
  <!-- Dress bodice -->
  <path d="M15 28 L33 28 L36 38 L12 38 Z" fill="#8E24AA"/>
  <!-- Neckline V -->
  <path d="M19 28 Q24 33 29 28" fill="#FDDBB8"/>
  <!-- Pearl necklace -->
  <path d="M19 27 Q24 30 29 27" fill="none" stroke="#FFFDE7" stroke-width="1.5" stroke-dasharray="2,1.5"/>
  <!-- Belt -->
  <rect x="12" y="37" width="24" height="2.5" rx="1.2" fill="#4A0072"/>
  <!-- Left arm -->
  <path d="M15 30 Q8 37 9 47 L14 46 L15 30 Z" fill="#8E24AA"/>
  <ellipse cx="11" cy="48" rx="3" ry="2.5" fill="#FDDBB8"/>
  <!-- Right arm with small clutch -->
  <path d="M33 30 Q40 37 39 47 L34 46 L33 30 Z" fill="#8E24AA"/>
  <ellipse cx="37" cy="48" rx="3" ry="2.5" fill="#FDDBB8"/>
  <rect x="34" y="46" width="7" height="5" rx="2" fill="#6A1B9A"/>
  <!-- Neck -->
  <rect x="21" y="22" width="6" height="8" rx="3" fill="#FDDBB8"/>
  <!-- Head -->
  <circle cx="24" cy="14" r="11" fill="#FDDBB8"/>
  <!-- Ears with pearl earrings -->
  <path d="M13 16 Q11 13 12 18 Q14 20 15 16 Z" fill="#E8AB80"/>
  <path d="M35 16 Q37 13 36 18 Q34 20 33 16 Z" fill="#E8AB80"/>
  <circle cx="13" cy="18" r="1.5" fill="#FFFDE7"/>
  <circle cx="35" cy="18" r="1.5" fill="#FFFDE7"/>
  <!-- Updo bun -->
  <path d="M13 11 Q15 4 24 3 Q33 4 35 11 L35 15 Q29 7 24 6 Q19 7 13 15 Z" fill="#1A0A05"/>
  <rect x="13" y="11" width="3" height="6" rx="1.5" fill="#1A0A05"/>
  <rect x="32" y="11" width="3" height="6" rx="1.5" fill="#1A0A05"/>
  <ellipse cx="24" cy="4" rx="7" ry="4.5" fill="#2C1810"/>
  <ellipse cx="22" cy="3" rx="3" ry="2" fill="#3D2415" opacity="0.6"/>
  <!-- Left eye -->
  <circle cx="19.5" cy="14" r="3.2" fill="white"/>
  <circle cx="20" cy="14.5" r="2" fill="#1A0A05"/>
  <circle cx="20.5" cy="13.8" r="0.7" fill="white"/>
  <!-- Right eye -->
  <circle cx="28.5" cy="14" r="3.2" fill="white"/>
  <circle cx="28" cy="14.5" r="2" fill="#1A0A05"/>
  <circle cx="28.5" cy="13.8" r="0.7" fill="white"/>
  <!-- Long eyelashes -->
  <path d="M17 10.5 Q19.5 9.5 22 10.5" stroke="#1A0A05" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M26 10.5 Q28.5 9.5 31 10.5" stroke="#1A0A05" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M23 17.5 Q24 19 25 17.5" stroke="#C07050" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <!-- Elegant smile -->
  <path d="M21 20.5 Q24 22.5 27 20.5" stroke="#B06040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="17" cy="18" r="2.5" fill="#FFAA88" opacity="0.3"/>
  <circle cx="31" cy="18" r="2.5" fill="#FFAA88" opacity="0.3"/>
  <!-- Outline -->
  <circle cx="24" cy="14" r="11" fill="none" stroke="#8B4A25" stroke-width="1.5"/>
