  <path d="M12 11 Q13 3 24 2 Q35 3 36 11 L36 14 Q32 5 24 4 Q16 5 12 14 Z" fill="#3E2723"/>
  <rect x="12" y="11" width="3" height="5" rx="1.5" fill="#3E2723"/>
  <path d="M18 6 Q24 4 30 6" fill="none" stroke="#5D4037" stroke-width="1"/>
  <!-- Left eye -->
  <circle cx="19.5" cy="14" r="3" fill="white"/>
  <circle cx="20" cy="14.5" r="1.9" fill="#3E2723"/>
  <circle cx="20.5" cy="13.8" r="0.6" fill="white"/>
  <!-- Right eye -->
  <circle cx="28.5" cy="14" r="3" fill="white"/>
  <circle cx="28" cy="14.5" r="1.9" fill="#3E2723"/>
  <circle cx="28.5" cy="13.8" r="0.6" fill="white"/>
  <!-- Eyebrows professional -->
  <path d="M17 10 Q19.5 9 22 10" stroke="#3E2723" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M26 10 Q28.5 9 31 10" stroke="#3E2723" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M23 17.5 Q24 19 25 17.5" stroke="#A05030" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Professional smile -->
  <path d="M21 20.5 Q24 22 27 20.5" stroke="#A05030" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Outline -->
  <circle cx="24" cy="14" r="12" fill="none" stroke="#7A3A18" stroke-width="1.5"/>
