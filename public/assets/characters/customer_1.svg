<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 72">
  <!-- Shadow -->
  <ellipse cx="24" cy="70" rx="12" ry="3" fill="#0000001A"/>
  <!-- Dress shoes -->
  <ellipse cx="20" cy="68" rx="5.5" ry="2.5" fill="#1A1A1A"/>
  <ellipse cx="29" cy="68" rx="5.5" ry="2.5" fill="#1A1A1A"/>
  <!-- Pants charcoal -->
  <rect x="16" y="50" width="7" height="20" rx="3" fill="#263238"/>
  <rect x="25" y="50" width="7" height="20" rx="3" fill="#263238"/>
  <!-- Suit jacket body -->
  <rect x="12" y="28" width="24" height="24" rx="6" fill="#37474F"/>
  <!-- White shirt center -->
  <path d="M21 28 L27 28 L27 44 Q24 46 21 44 Z" fill="#ECEFF1"/>
  <!-- Jacket lapels -->
  <path d="M12 28 L21 28 L21 44 Q16 43 12 37 Z" fill="#455A64"/>
  <path d="M36 28 L27 28 L27 44 Q32 43 36 37 Z" fill="#455A64"/>
