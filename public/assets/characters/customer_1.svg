  <path d="M12 30 Q5 36 6 46 L11 46 L12 30 Z" fill="#37474F"/>
  <rect x="5" y="44" width="8" height="4" rx="2" fill="#ECEFF1" opacity="0.85"/>
  <ellipse cx="9" cy="48" rx="3.5" ry="2.5" fill="#D4845A"/>
  <!-- Right arm with briefcase -->
  <path d="M36 30 Q43 36 42 46 L37 46 L36 30 Z" fill="#37474F"/>
  <rect x="36" y="44" width="8" height="4" rx="2" fill="#ECEFF1" opacity="0.85"/>
  <ellipse cx="40" cy="48" rx="3.5" ry="2.5" fill="#D4845A"/>
  <!-- Briefcase -->
  <rect x="36" y="48" width="11" height="8" rx="2" fill="#5D4037"/>
  <rect x="39" y="46" width="5" height="3" rx="1" fill="none" stroke="#5D4037" stroke-width="1.5"/>
  <rect x="37" y="51" width="9" height="1" rx="0.5" fill="#795548"/>
  <circle cx="41.5" cy="52" r="0.9" fill="#A1887F"/>
  <!-- Neck -->
  <rect x="21" y="22" width="6" height="8" rx="3" fill="#D4845A"/>
  <!-- Head -->
  <circle cx="24" cy="14" r="12" fill="#D4845A"/>
  <!-- Ears -->
  <path d="M12 16 Q10 13 11 18 Q13 20 14 16 Z" fill="#BC6E46"/>
  <path d="M36 16 Q38 13 37 18 Q35 20 34 16 Z" fill="#BC6E46"/>
