  <polygon points="22,29 24,32 22,44 24,46 26,44 26,29" fill="#1565C0"/>
  <polygon points="21,28 27,28 26,29 24,32 22,29" fill="#1976D2"/>
  <path d="M23 35 L25 35" stroke="#0D47A1" stroke-width="0.8"/>
  <path d="M22.5 38 L25.5 38" stroke="#0D47A1" stroke-width="0.8"/>
