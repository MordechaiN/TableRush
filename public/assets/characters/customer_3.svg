<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 72">
  <!-- Shadow -->
  <ellipse cx="24" cy="70" rx="11" ry="2.5" fill="#0000001A"/>
  <!-- Cool sneakers with orange stripe -->
  <ellipse cx="19.5" cy="68" rx="5.5" ry="2.5" fill="#FFFFFF"/>
  <ellipse cx="28.5" cy="68" rx="5.5" ry="2.5" fill="#FFFFFF"/>
  <path d="M14 67 Q20 65 25 67" fill="none" stroke="#FF5722" stroke-width="1"/>
  <path d="M23 67 Q29 65 34 67" fill="none" stroke="#FF5722" stroke-width="1"/>
  <!-- Slim black jeans -->
  <rect x="17" y="50" width="6" height="20" rx="3" fill="#212121"/>
  <rect x="25" y="50" width="6" height="20" rx="3" fill="#212121"/>
  <!-- Bold orange jacket -->
  <rect x="13" y="28" width="22" height="24" rx="5" fill="#E64A19"/>
  <!-- Jacket open front, inner shirt -->
  <path d="M19 28 L29 28 L29 44 Q24 46 19 44 Z" fill="#FBE9E7"/>
  <circle cx="24" cy="35" r="4" fill="#FF8A65" opacity="0.5"/>
  <!-- Left jacket panel -->
  <path d="M13 28 L19 28 L19 44 Q15 43 13 37 Z" fill="#D84315"/>
  <!-- Right jacket panel -->
  <path d="M35 28 L29 28 L29 44 Q33 43 35 37 Z" fill="#D84315"/>
  <path d="M19 28 L24 31 L29 28" fill="none" stroke="#BF360C" stroke-width="1.2"/>
  <!-- Zipper pull -->
  <rect x="23.5" y="32" width="1" height="8" rx="0.5" fill="#FF8A65"/>
  <!-- Left arm -->
  <path d="M13 30 Q6 36 7 46 L12 45 L13 30 Z" fill="#E64A19"/>
  <rect x="6" y="43" width="8" height="4" rx="2" fill="#FBE9E7" opacity="0.85"/>
  <ellipse cx="10" cy="48" rx="3.5" ry="2.5" fill="#FBCDA0"/>
  <!-- Right arm -->
  <path d="M35 30 Q42 36 41 46 L36 45 L35 30 Z" fill="#E64A19"/>
  <rect x="35" y="43" width="8" height="4" rx="2" fill="#FBE9E7" opacity="0.85"/>
  <ellipse cx="39" cy="48" rx="3.5" ry="2.5" fill="#FBCDA0"/>
  <!-- Neck -->
  <rect x="21" y="22" width="6" height="8" rx="3" fill="#FBCDA0"/>
  <!-- Head -->
  <circle cx="24" cy="14" r="12" fill="#FBCDA0"/>
  <!-- Ears -->
  <path d="M12 16 Q10 13 11 18 Q13 20 14 16 Z" fill="#E0A880"/>
  <path d="M36 16 Q38 13 37 18 Q35 20 34 16 Z" fill="#E0A880"/>
  <circle cx="12" cy="16" r="1" fill="#FF5722"/>
  <!-- Dark styled hair with yellow streak -->
  <path d="M12 11 Q14 3 24 2 Q34 3 36 11 L36 14 Q30 6 24 5 Q18 6 12 14 Z" fill="#1A1A1A"/>
  <rect x="12" y="11" width="3" height="5" rx="1.5" fill="#1A1A1A"/>
  <rect x="33" y="11" width="3" height="5" rx="1.5" fill="#1A1A1A"/>
  <!-- Yellow bleached streak -->
  <path d="M28 4 Q32 5 35 9 L33 11 Q30 7 27 5 Z" fill="#FFE082"/>
  <!-- Sunglasses on forehead -->
  <rect x="15" y="7" width="18" height="4" rx="2" fill="#1A1A1A" opacity="0.85"/>
  <rect x="15.5" y="7.5" width="7" height="3" rx="1.5" fill="#26C6DA" opacity="0.55"/>
  <rect x="25.5" y="7.5" width="7" height="3" rx="1.5" fill="#26C6DA" opacity="0.55"/>
  <!-- Left eye -->
  <circle cx="19.5" cy="14.5" r="3" fill="white"/>
  <circle cx="20" cy="15" r="1.9" fill="#1A1A1A"/>
  <circle cx="20.5" cy="14.3" r="0.6" fill="white"/>
  <!-- Right eye -->
  <circle cx="28.5" cy="14.5" r="3" fill="white"/>
  <circle cx="28" cy="15" r="1.9" fill="#1A1A1A"/>
  <circle cx="28.5" cy="14.3" r="0.6" fill="white"/>
  <!-- Cool arched brows -->
  <path d="M17 11 Q19.5 9.5 22 10.5" stroke="#1A1A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M26 10.5 Q28.5 9.5 31 11" stroke="#1A1A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M23 18 Q24 19.5 25 18" stroke="#B07050" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Cool smirk -->
  <path d="M21.5 21 Q25 23 27.5 21" stroke="#B07050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Outline -->
  <circle cx="24" cy="14" r="12" fill="none" stroke="#8B4A25" stroke-width="1.5"/>
