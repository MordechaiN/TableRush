  <rect x="21" y="22" width="6" height="8" rx="3" fill="#FDA07A"/>
  <!-- Head -->
  <circle cx="24" cy="15" r="13" fill="#FDA07A"/>
  <!-- Ear left -->
  <path d="M11 17 Q9 14 10 19 Q12 21 13 17 Z" fill="#E88060"/>
  <!-- Ear right -->
  <path d="M37 17 Q39 14 38 19 Q36 21 35 17 Z" fill="#E88060"/>
