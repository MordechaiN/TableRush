  <rect x="5" y="45" width="8" height="4" rx="2" fill="#FAFAFA" opacity="0.85"/>
  <ellipse cx="9" cy="48" rx="3.5" ry="2.5" fill="#FDA07A"/>
  <!-- Right arm (tray position) -->
  <path d="M37 32 Q44 37 43 47 L38 47 L37 32 Z" fill="#1A2472"/>
  <!-- Right cuff + hand -->
  <rect x="35" y="45" width="8" height="4" rx="2" fill="#FAFAFA" opacity="0.85"/>
