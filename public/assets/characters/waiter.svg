  <rect x="25" y="52" width="7" height="20" rx="3" fill="#14143A"/>
  <!-- Shoes -->
  <ellipse cx="19.5" cy="72" rx="5.5" ry="2.8" fill="#0A0A18"/>
  <ellipse cx="28.5" cy="72" rx="5.5" ry="2.8" fill="#0A0A18"/>
  <ellipse cx="18.5" cy="71" rx="2.5" ry="1.2" fill="#222240" opacity="0.5"/>
  <ellipse cx="27.5" cy="71" rx="2.5" ry="1.2" fill="#222240" opacity="0.5"/>
  <!-- Jacket body -->
  <rect x="11" y="28" width="26" height="26" rx="7" fill="#1A2472"/>
  <!-- Shirt center white -->
  <path d="M22 28 L26 28 L26 45 Q24 47 22 45 Z" fill="#FAFAFA"/>
