  <path d="M16 10 Q19 9 22 10" stroke="#2C1810" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M26 10 Q29 9 32 10" stroke="#2C1810" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M23 18 Q24 19.5 25 18" stroke="#C07050" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M20 21 Q24 24.5 28 21" stroke="#C07050" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="17" cy="20" r="3" fill="#FFAA88" opacity="0.3"/>
  <circle cx="31" cy="20" r="3" fill="#FFAA88" opacity="0.3"/>
