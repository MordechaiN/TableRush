<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 76">
  <!-- Shadow (wider for walking) -->
  <ellipse cx="24" cy="74" rx="15" ry="3.5" fill="#0000001A"/>
  <!-- Left leg forward -->
  <rect x="13" y="52" width="7" height="18" rx="3" fill="#14143A"/>
  <!-- Right leg back -->
  <rect x="27" y="56" width="7" height="14" rx="3" fill="#0E0E2A"/>
  <!-- Shoes -->
  <ellipse cx="16.5" cy="71" rx="6" ry="2.8" fill="#0A0A18"/>
  <ellipse cx="30.5" cy="71" rx="5" ry="2.5" fill="#0A0A18"/>
  <!-- Jacket body -->
  <rect x="11" y="28" width="26" height="26" rx="7" fill="#1A2472"/>
  <!-- Shirt center white -->
  <path d="M22 28 L26 28 L26 45 Q24 47 22 45 Z" fill="#FAFAFA"/>
  <!-- Lapels -->
  <path d="M11 28 L22 28 L22 45 Q16 44 11 37 Z" fill="#1E2B85"/>
  <path d="M37 28 L26 28 L26 45 Q32 44 37 37 Z" fill="#1E2B85"/>
  <!-- Pocket square -->
  <rect x="12" y="31" width="6" height="5" rx="1.5" fill="#FAFAFA" opacity="0.65"/>
  <!-- Bow tie -->
  <polygon points="20,33 24,36 20,39" fill="#C62828"/>
  <polygon points="28,33 24,36 28,39" fill="#C62828"/>
  <circle cx="24" cy="36" r="2" fill="#D32F2F"/>
  <!-- Left arm swung back -->
  <path d="M11 32 Q3 38 4 48 L9 47 L11 32 Z" fill="#1A2472"/>
  <rect x="4" y="45" width="8" height="4" rx="2" fill="#FAFAFA" opacity="0.85"/>
  <ellipse cx="8" cy="49" rx="3.5" ry="2.5" fill="#FDA07A"/>
  <!-- Right arm raised (tray up) -->
  <path d="M37 32 Q44 28 45 38 L40 40 L37 32 Z" fill="#1A2472"/>
  <rect x="38" y="38" width="8" height="4" rx="2" fill="#FAFAFA" opacity="0.85"/>
  <ellipse cx="42" cy="41" rx="3.5" ry="2.5" fill="#FDA07A"/>
  <!-- Neck -->
  <rect x="21" y="22" width="6" height="8" rx="3" fill="#FDA07A"/>
  <!-- Head -->
  <circle cx="24" cy="15" r="13" fill="#FDA07A"/>
  <!-- Ears -->
  <path d="M11 17 Q9 14 10 19 Q12 21 13 17 Z" fill="#E88060"/>
  <path d="M37 17 Q39 14 38 19 Q36 21 35 17 Z" fill="#E88060"/>
  <!-- Hair -->
  <path d="M11 11 Q13 3 24 2 Q35 3 37 11 L37 16 Q32 6 24 5 Q16 6 11 16 Z" fill="#2C1810"/>
  <rect x="11" y="11" width="3.5" height="7" rx="1.7" fill="#2C1810"/>
  <rect x="33.5" y="11" width="3.5" height="7" rx="1.7" fill="#2C1810"/>
  <!-- Eyes (focused/walking) -->
  <circle cx="19" cy="14" r="3.2" fill="white"/>
  <circle cx="19.5" cy="14.5" r="2" fill="#2C1810"/>
  <circle cx="20" cy="13.8" r="0.7" fill="white"/>
  <circle cx="29" cy="14" r="3.2" fill="white"/>
  <circle cx="28.5" cy="14.5" r="2" fill="#2C1810"/>
  <circle cx="29" cy="13.8" r="0.7" fill="white"/>
  <!-- Eyebrows (concentrated) -->
  <path d="M16 9.5 Q19 8.5 22 9.5" stroke="#2C1810" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M26 9.5 Q29 8.5 32 9.5" stroke="#2C1810" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M23 18 Q24 19.5 25 18" stroke="#C07050" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Focused expression (straight mouth) -->
  <rect x="21" y="21.5" width="6" height="1.5" rx="0.7" fill="#C07050"/>
  <!-- Outlines -->
  <circle cx="24" cy="15" r="13" fill="none" stroke="#8B4A25" stroke-width="1.5"/>
  <rect x="11" y="28" width="26" height="26" rx="7" fill="none" stroke="#0D1550" stroke-width="1.5"/>
</svg>
