<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 64" width="48" height="64">
  <!-- Pot body -->
  <path d="M10,44 L14,62 L34,62 L38,44 Z" fill="#C4632A"/>
  <rect x="10" y="44" width="28" height="5" rx="2" fill="#D4743A"/>
  <!-- Pot rim highlight -->
  <rect x="10" y="44" width="28" height="2" rx="1" fill="#E8904A" opacity="0.6"/>
  <!-- Pot shadow -->
  <ellipse cx="24" cy="62" rx="11" ry="2" fill="#000000" opacity="0.15"/>
  <!-- Soil surface -->
  <ellipse cx="24" cy="45" rx="14" ry="4" fill="#5C3A1E"/>
  <ellipse cx="24" cy="44" rx="12" ry="3" fill="#7A5030"/>
  <!-- Main stem -->
  <path d="M24,44 Q22,36 20,28 Q18,20 22,14" stroke="#3A7A22" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right stem -->
  <path d="M24,42 Q28,34 32,28 Q35,22 31,16" stroke="#3A7A22" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left stem -->
  <path d="M24,40 Q19,32 16,24 Q13,18 16,13" stroke="#3A7A22" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Leaves — left cluster -->
  <ellipse cx="18" cy="22" rx="9" ry="6" fill="#2D8A1A" transform="rotate(-30,18,22)"/>
  <ellipse cx="14" cy="17" rx="8" ry="5" fill="#3A9A22" transform="rotate(-45,14,17)"/>
  <ellipse cx="19" cy="12" rx="7" ry="5" fill="#2D8A1A" transform="rotate(20,19,12)"/>
  <!-- Leaves — right cluster -->
  <ellipse cx="31" cy="20" rx="9" ry="5.5" fill="#2D8A1A" transform="rotate(25,31,20)"/>
  <ellipse cx="33" cy="15" rx="8" ry="5" fill="#3A9A22" transform="rotate(40,33,15)"/>
  <!-- Top center leaf -->
  <ellipse cx="22" cy="10" rx="8" ry="5" fill="#2D8A1A" transform="rotate(-15,22,10)"/>
  <!-- Leaf highlights -->
  <ellipse cx="18" cy="20" rx="4" ry="2.5" fill="#55BB33" opacity="0.5" transform="rotate(-30,18,20)"/>
  <ellipse cx="31" cy="18" rx="4" ry="2" fill="#55BB33" opacity="0.5" transform="rotate(25,31,18)"/>
</svg>
