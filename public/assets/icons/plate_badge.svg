<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Outer plate ring -->
  <circle cx="24" cy="24" r="20" fill="#F5F0E8" stroke="#C8BCA8" stroke-width="1.5"/>
  <!-- Inner plate ring -->
  <circle cx="24" cy="24" r="14" fill="#F0EBE0" stroke="#D8D0C0" stroke-width="1"/>
  <!-- Fork (left of plate) -->
  <g stroke="#C8A060" stroke-linecap="round" fill="none">
    <line x1="8" y1="11" x2="8" y2="37" stroke-width="1.8"/>
    <!-- Tines -->
    <line x1="6" y1="11" x2="6" y2="18" stroke-width="1.4"/>
    <line x1="8" y1="11" x2="8" y2="18" stroke-width="1.4"/>
    <line x1="10" y1="11" x2="10" y2="18" stroke-width="1.4"/>
    <line x1="6" y1="18" x2="10" y2="18" stroke-width="1.2"/>
  </g>
  <!-- Knife (right of plate) -->
  <g stroke="#C8A060" stroke-linecap="round" fill="none">
    <line x1="40" y1="11" x2="40" y2="37" stroke-width="1.8"/>
    <path d="M40,11 Q44,14 43,20 Q41,22 40,22" stroke-width="1.4"/>
  </g>
</svg>
